<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoJSON 地图编辑器</title>
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        crossorigin="anonymous" />
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <!-- Leaflet.draw CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"
        crossorigin="" />
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- 左侧控制面板 -->
    <div id="controls" class="panel">
        <h2>地图控制</h2>

        <!-- 基础功能 -->
        <div class="control-group">
            <label for="baseMapSelect">底图选择：</label>
            <select id="baseMapSelect">
                <option value="osm">OpenStreetMap</option>
                <option value="stamen">Stamen Toner</option>
                <option value="carto">CartoDB Positron</option>
            </select>
        </div>

        <hr class="divider">

        <!-- GeoJSON 功能 -->
        <div class="control-group">
            <button id="exportGeoJSONBtn">导出 GeoJSON</button>
        </div>
        <div class="control-group">
            <label for="geojsonFile">导入 GeoJSON：</label>
            <input type="file" id="geojsonFile" accept=".json,.geojson" />
        </div>
        <div class="control-group">
            <button id="toggleEditorBtn">显示代码编辑器</button>
        </div>

        <hr class="divider">

        <!-- 图层面板控制 -->
        <div class="control-group">
            <button id="toggleLayerPanelBtn">显示图层面板</button>
        </div>

        <hr class="divider">

        <!-- Excel/CSV 数据导入导出 -->
        <div class="control-group">
            <label>下载导入模板：</label>
            <button id="downloadTemplateBtn">下载 Excel 模板</button>
        </div>
        <div class="control-group">
            <label for="excelFile">导入 Excel：</label>
            <input type="file" id="excelFile" accept=".xlsx,.xls" />
        </div>
        <div class="control-group">
            <button id="exportExcelBtn">导出 Excel（完整字段）</button>
        </div>
        <div class="control-group">
            <label for="coordFile">导入 CSV：</label>
            <input type="file" id="coordFile" accept=".csv,.txt" />
        </div>
        <div class="control-group">
            <button id="exportBtn">导出 CSV（仅坐标）</button>
        </div>

        <hr class="divider">

        <!-- 工具功能 -->
        <div class="control-group">
            <button id="togglePickerBtn">启用坐标拾取</button>
            <div id="pickedCoords" style="font-size:0.8rem; color:#aaa; margin-top:4px;"></div>
        </div>
        <div class="control-group">
            <label>手动添加标注：</label>
            <input type="text" id="manualNote" placeholder="输入备注信息" />
            <button id="addManualMarkerBtn">点击地图添加</button>
        </div>
        <div class="control-group">
            <label for="searchAddress">搜索地址：</label>
            <input type="text" id="searchAddress" placeholder="输入地址搜索" />
            <button id="searchBtn">搜索</button>
        </div>
        <div class="control-group">
            <label>输入坐标定位：</label>
            <input type="number" id="gotoLat" placeholder="纬度" step="0.000001" style="width:100%; margin-bottom:4px;" />
            <input type="number" id="gotoLng" placeholder="经度" step="0.000001" style="width:100%; margin-bottom:4px;" />
            <button id="gotoCoordBtn">跳转到中心</button>
        </div>

        <hr class="divider">

        <!-- 显示选项 -->
        <div class="control-group">
            <label for="markerIconSelect">标记图标样式：</label>
            <select id="markerIconSelect">
                <option value="blue">蓝色标记</option>
                <option value="red">红色标记</option>
                <option value="green">绿色标记</option>
                <option value="orange">橙色标记</option>
                <option value="yellow">黄色标记</option>
                <option value="violet">紫色标记</option>
                <option value="grey">灰色标记</option>
                <option value="black">黑色标记</option>
            </select>
        </div>
        <div class="control-group">
            <label>
                <input type="checkbox" id="showLabelsCheck" />
                显示标注名称
            </label>
        </div>
    </div>

    <!-- 右侧图层面板 -->
    <div id="layerPanel" class="panel">
        <h2>图层列表</h2>
        <div id="layerList"></div>
        <button id="clearAllBtn" style="margin-top:10px; width:100%; background:#e74c3c;">清空所有图层</button>
    </div>

    <!--地图容器 -->
    <div id="map"></div>

    <!-- 右键菜单 -->
    <div id="contextMenu" class="context-menu" style="display:none;">
        <div class="context-menu-item" onclick="editMarkerProperties()">编辑属性</div>
        <div class="context-menu-item" onclick="changeMarkerIcon()">更改图标</div>
        <div class="context-menu-item" onclick="deleteSelectedMarker()">删除标记</div>
    </div>

    <!-- GeoJSON 代码编辑器（默认隐藏） -->
    <div id="editorPanel" style="display:none;">
        <h2>GeoJSON 编辑器</h2>

        <!-- Save/Load Slots -->
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <select id="saveSlotSelect" style="flex:1;">
                <option value="slot1">存档 1</option>
                <option value="slot2">存档 2</option>
                <option value="slot3">存档 3</option>
                <option value="slot4">存档 4</option>
                <option value="slot5">存档 5</option>
            </select>
            <button id="saveSlotBtn" style="width:auto;">保存</button>
            <button id="loadSlotBtn" style="width:auto;">读取</button>
        </div>

        <textarea id="geojsonEditor" spellcheck="false"></textarea>

        <div style="display:flex; gap:10px;">
            <button id="applyEditorBtn" style="flex:1;">应用到地图</button>
            <button
                onclick="document.getElementById('editorPanel').style.display='none'; document.getElementById('toggleEditorBtn').textContent='显示代码编辑器'"
                style="flex:1; background:#e74c3c;">关闭</button>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <!-- Leaflet.draw JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js" crossorigin=""></script>
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"
        crossorigin="anonymous"></script>
    <!-- SheetJS for Excel support -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
